name: Docker Verify

on:
  pull_request:
    branches:
      - main
      - opencode/infra-runtime/runtime-verify-baseline
  workflow_dispatch:

jobs:
  docker-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Verify JSON schema
        run: python -m json.tool contracts/schemas/ai_output.json

      - name: Run backend tests
        run: python -m pytest tests

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Verify Docker Compose config
        run: docker compose -f infra/docker-compose.yml config

      - name: Build backend image
        run: docker compose -f infra/docker-compose.yml build backend

      - name: Build web image
        run: docker compose -f infra/docker-compose.yml build web
